<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- M9: Content-Security-Policy — enforce local-only execution, no external network -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' blob:; connect-src 'none'; font-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';" />
    <title>ImageProof</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>ImageProof</h1>
      <p class="subtitle">Local visual authenticity verification</p>

      <section class="card">
        <h2>Upload</h2>
        <input id="fileInput" class="hidden-input" type="file" accept="image/*" />
        <div id="dropZone" class="drop-zone" role="button" tabindex="0" aria-label="Upload image">
          <div id="dropPrompt" class="drop-prompt">
            <p class="drop-title">Drag & drop image here</p>
            <p class="drop-subtitle">or click to browse</p>
          </div>
          <img id="previewImage" class="preview-image hidden" alt="Uploaded preview" />
        </div>

        <div class="action-row">
          <button id="verifyBtn" class="verify-btn" disabled>Verify</button>
          <button id="clearBtn" class="clear-btn hidden" type="button">Clear</button>
        </div>
      </section>

      <section class="card">
        <h2>Result</h2>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-label">Confidence</div>
            <div id="confidenceValue" class="result-value">—</div>
          </div>
          <div class="result-item">
            <div class="result-label">Justification</div>
            <div id="justificationValue" class="result-value">Load an image and verify to see a result.</div>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
